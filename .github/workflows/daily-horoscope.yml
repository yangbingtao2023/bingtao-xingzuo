name: 每日星座运势管道

on:
  schedule:
    # 北京时间每天早上 6:00 (UTC+8 → UTC 22:00 前一天)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      KB_ROOT: ${{ github.workspace }}
      TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: |
          pip install requests feedparser
          npm install -g @cloudbase/cli

      - name: 登录 CloudBase
        run: |
          npx tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: 抓取运势
        working-directory: 工具/app/xiangyu-horoscope-fetcher
        env:
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
        run: python fetch_daily_horoscope.py

      - name: 转换格式
        working-directory: 业务/星座运势小程序/数据管道
        run: python transform_horoscope.py

      - name: 推送到 CloudBase
        working-directory: 业务/星座运势小程序/数据管道
        run: python upload_to_cloudbase.py
